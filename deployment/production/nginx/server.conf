# 校园互助平台 Nginx 配置
# Server configuration for campus helping platform

# 上游后端服务
upstream backend {
    server backend:8080;
    keepalive 32;
}

# 上游管理端前端
upstream admin-frontend {
    server admin:80;
    keepalive 16;
}

# 上传文件大小限制
client_max_body_size 100m;

server {
    listen 80;
    server_name localhost;

    # 重定向到HTTPS（生产环境建议启用）
    # return 301 https://$server_name$request_uri;

    # 访问日志
    access_log /var/log/nginx/host.access.log main;

    # ==================== 后端API代理 ====================
    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        
        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # 缓冲区设置
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # ==================== WebSocket代理 ====================
    location /ws/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket超时设置
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ==================== Swagger UI ====================
    location /swagger-ui/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ==================== 文件上传目录 ====================
    location /uploads/ {
        alias /data/uploads/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        
        # 禁止访问隐藏文件
        location ~ /\. {
            deny all;
        }
    }

    # ==================== 管理端前端 ====================
    location /admin/ {
        proxy_pass http://admin-frontend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # SPA路由支持
        try_files $uri $uri/ /admin/index.html;
    }

    # ==================== 用户端前端（可选部署）====================
    # 如果需要部署用户端，取消注释以下配置
    # location / {
    #     proxy_pass http://user-frontend:3000/;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     try_files $uri $uri/ /index.html;
    # }

    # ==================== 健康检查 ====================
    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # ==================== 根路径 ====================
    location / {
        # 返回简单说明或重定向到管理端
        return 200 'Campus Helping Platform API Server';
        add_header Content-Type text/plain;
    }

    # ==================== 错误页面 ====================
500 502     error_page 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}

