# Spring Boot Production Configuration
server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: campus-helping-platform

  # MySQL Production Database
  datasource:
    url: jdbc:mysql://${DB_HOST:-mysql}:${DB_PORT:-3306}/${DB_NAME:-campus}?useUnicode=true&characterEncoding=utf8&useSSL=true&requireSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&rewriteBatchedStatements=true
    username: ${DB_USERNAME:-root}
    password: ${DB_PASSWORD:-campus_secure_pass_2024}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      pool-name: CampusHikariCP
      max-lifetime: 1800000
      connection-timeout: 30000
      connection-test-query: SELECT 1

  # JPA/Hibernate Configuration
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

# MyBatis-Plus Configuration
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.campus.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:-your-production-jwt-secret-must-be-at-least-256-bits-long-and-secure}
  expiration: ${JWT_EXPIRATION:-604800000}

# WebSocket Configuration
websocket:
  endpoint: /ws
  allowed-origins: ${ALLOWED_ORIGINS:-*}

# SpringDoc OpenAPI Configuration
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true

# Logging Configuration
logging:
  level:
    root: INFO
    com.campus: INFO
    com.baomidou.mybatisplus: INFO
    org.springframework.security: INFO
  file:
    name: logs/campus.log
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized
