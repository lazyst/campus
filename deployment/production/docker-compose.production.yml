version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: campus-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-campus_secure_root_pass_2024}
      MYSQL_DATABASE: campus
      MYSQL_USER: campus
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-campus_secure_pass_2024}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "3306:3306"
    networks:
      - campus-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Application
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile.production
    container_name: campus-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: production
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/campus?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-campus_secure_root_pass_2024}
      JWT_SECRET: ${JWT_SECRET:-your-production-jwt-secret-must-be-at-least-256-bits-long}
      JWT_EXPIRATION: 604800000
    ports:
      - "8080:8080"
    networks:
      - campus-network
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: campus-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ../frontend-admin/dist:/usr/share/nginx/html/admin:ro
      - ../frontend-user/dist:/usr/share/nginx/html/user:ro
      - nginx_logs:/var/log/nginx
    networks:
      - campus-network
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  mysql_data:
    driver: local
  nginx_logs:
    driver: local

networks:
  campus-network:
    driver: bridge
