server:
  port: 8080
  address: 0.0.0.0  # 监听所有网卡

spring:
  application:
    name: campus-helping-platform

  # 动态数据源配置（读写分离）
  datasource:
    dynamic:
      # 默认主库（写操作）
      primary: master
      # 严格模式：未匹配到数据源时直接报错
      strict: true
      
      datasource:
        # 主库配置（写操作）
        master:
          driver-class-name: com.mysql.cj.jdbc.Driver
          url: jdbc:mysql://${DB_HOST:localhost}:3306/campus_fenbushi?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&connectionCollation=utf8mb4_unicode_ci
          username: root
          password: ${DB_PASSWORD:123}
          druid:
            initial-size: 5
            min-idle: 5
            max-active: 20
            max-wait: 60000
            time-between-eviction-runs-millis: 60000
            min-evictable-idle-time-millis: 300000
            validation-query: SELECT 1
            test-while-idle: true
            test-on-borrow: false
            test-on-return: false
            filters: stat,wall,slf4j
            
        # 从库配置（读操作）
        slave:
          driver-class-name: com.mysql.cj.jdbc.Driver
          url: jdbc:mysql://${DB_SLAVE_HOST:localhost}:${DB_SLAVE_PORT:3307}/campus_fenbushi?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&connectionCollation=utf8mb4_unicode_ci
          username: root
          password: ${DB_SLAVE_PASSWORD:123}
          druid:
            initial-size: 5
            min-idle: 5
            max-active: 20
            max-wait: 60000
            time-between-eviction-runs-millis: 60000
            min-evictable-idle-time-millis: 300000
            validation-query: SELECT 1
            test-while-idle: true
            test-on-borrow: false
            test-on-return: false
            filters: stat,wall,slf4j

  # 文件上传配置
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 20MB

  # Jackson配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
      write-durations-as-timestamps: false
    parser:
      allow-unquoted-control-chars: true

  # Redis配置
  data:
    redis:
      host: ${REDIS_HOST:172.19.119.151}
      port: 6379
      password: ${REDIS_PASSWORD:123}
      database: 0
      timeout: 10000ms
      lettuce:
        pool:
          max-active: 20
          max-wait: -1ms
          max-idle: 10
          min-idle: 0

# MyBatis-Plus配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.campus.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT配置
jwt:
  secret: ${JWT_SECRET:campus-helping-platform-jwt-secret-key-2024-very-long-and-secure-123}
  expiration: 604800000  # 7天有效期 (毫秒)
  header: Authorization
  prefix: Bearer

# WebSocket配置
websocket:
  endpoint: /ws
  allowed-origins: "*"
  topics:
    messages: /topic/messages
    queue: /queue/messages

# Swagger配置
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
  show-actuator: false
  default-consumes-media-type: application/json
  default-produces-media-type: application/json

# 日志配置
logging:
  level:
    root: INFO
    com.campus: DEBUG
    com.baomidou.mybatisplus: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# 应用自定义配置
app:
  host: http://localhost:8080
  upload-path: ./uploads
  default-avatar: /images/default-avatar.png
